<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-surface": "#191c1d",
              "background": "#f8fafa",
              "inverse-surface": "#2e3131",
              "surface-container": "#eceeee",
              "secondary": "#5c614d",
              "surface-tint": "#076968",
              "error": "#ba1a1a",
              "on-tertiary": "#ffffff",
              "on-primary-fixed": "#00201f",
              "on-primary-container": "#94e2e0",
              "on-background": "#191c1d",
              "on-secondary-fixed": "#191d0e",
              "surface-container-high": "#e6e8e8",
              "primary": "#004d4c",
              "on-primary-fixed-variant": "#00504f",
              "error-container": "#ffdad6",
              "inverse-primary": "#86d4d2",
              "primary-fixed": "#a2f0ee",
              "surface-variant": "#e1e3e3",
              "tertiary-container": "#cca73b",
              "tertiary-fixed-dim": "#eac254",
              "outline-variant": "#bec9c8",
              "secondary-fixed": "#e0e5cc",
              "primary-container": "#006766",
              "on-secondary": "#ffffff",
              "surface-container-low": "#f2f4f4",
              "tertiary-fixed": "#ffdf90",
              "secondary-fixed-dim": "#c4c9b1",
              "outline": "#6f7978",
              "on-secondary-container": "#606551",
              "surface-container-lowest": "#ffffff",
              "on-primary": "#ffffff",
              "surface-container-highest": "#e1e3e3",
              "surface": "#f8fafa",
              "secondary-container": "#dee2c9",
              "surface-dim": "#d8dada",
              "inverse-on-surface": "#eff1f1",
              "on-secondary-fixed-variant": "#444936",
              "primary-fixed-dim": "#86d4d2",
              "on-tertiary-fixed": "#241a00",
              "on-surface-variant": "#3e4948",
              "on-error-container": "#93000a",
              "surface-bright": "#f8fafa",
              "on-tertiary-fixed-variant": "#584400",
              "on-tertiary-container": "#503d00",
              "on-error": "#ffffff",
              "tertiary": "#755b00"
            },
            fontFamily: {
              "headline": ["Manrope"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(248, 250, 250, 0.8);
            backdrop-filter: blur(20px);
        }
        .sanctuary-gradient {
            background: linear-gradient(135deg, #004d4c 0%, #006766 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-between">
<div class="w-full max-w-md mx-auto px-6 pt-16 flex-grow flex flex-col">
<header class="flex flex-col items-center text-center mb-12">
<div class="w-20 h-20 sanctuary-gradient rounded-xl flex items-center justify-center mb-6 shadow-xl shadow-primary/10">
<span class="material-symbols-outlined text-white text-4xl" data-icon="shield" style="font-variation-settings: &quot;FILL&quot; 1;">shield</span>
</div>
<h1 class="font-headline text-3xl font-extrabold tracking-tight text-primary" style="">MawaSmart</h1>
<p class="font-headline text-sm font-semibold tracking-[0.2em] text-outline mt-1 uppercase" style="">Financial Sanctuary</p>
</header>
<main class="w-full space-y-8">
<div class="space-y-6">
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant ml-1" style="">Nomor Induk Santri (NIS)</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 w-1 bg-primary rounded-full scale-y-0 group-focus-within:scale-y-75 transition-transform duration-300"></div>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 px-5 text-on-surface focus:bg-surface-container-highest focus:ring-0 transition-all placeholder:text-outline/50 font-medium" placeholder="Contoh: 12345678" type="text">
</div>
</div>
<div class="space-y-2">
<label class="font-label text-xs font-semibold text-on-surface-variant ml-1" style="">Kata Sandi / PIN</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 w-1 bg-primary rounded-full scale-y-0 group-focus-within:scale-y-75 transition-transform duration-300"></div>
<input class="w-full bg-surface-container-high border-none rounded-xl py-4 px-5 text-on-surface focus:bg-surface-container-highest focus:ring-0 transition-all placeholder:text-outline/50 font-medium" placeholder="••••••••" type="password">
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" style="">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility" style="">visibility</span>
</button>
</div>
</div>
<div class="flex justify-end">
<button class="text-sm font-semibold text-primary hover:text-primary-container transition-colors" style="">
                        Lupa PIN / Bermasalah?
                    </button>
</div>
</div>
<button class="w-full bg-primary text-on-primary font-headline font-bold py-4 rounded-xl shadow-lg shadow-primary/20 hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2" style="">
<span class="" style="">Masuk Ke Akun</span>
<span class="material-symbols-outlined text-[20px]" data-icon="arrow_forward" style="">arrow_forward</span>
</button>
</main>
<section class="mt-12 mb-8">
<div class="bg-surface-container-low rounded-2xl p-6 relative overflow-hidden flex items-center gap-4">
<div class="relative z-10 w-12 h-12 rounded-full bg-surface-container-highest flex items-center justify-center">
<span class="material-symbols-outlined text-primary" data-icon="fingerprint" style="">fingerprint</span>
</div>
<div class="relative z-10">
<p class="text-sm font-bold text-on-surface" style="">Biometric Login</p>
<p class="text-xs text-on-surface-variant" style="">Aktifkan untuk akses lebih cepat</p>
</div>
<div class="ml-auto relative z-10">
<div class="w-10 h-6 bg-outline-variant/30 rounded-full flex items-center px-1">
<div class="w-4 h-4 bg-white rounded-full shadow-sm"></div>
</div>
</div>
<div class="absolute right-0 top-0 w-24 h-24 bg-primary/5 rounded-full -mr-8 -mt-8"></div>
</div>
</section>
</div>
<footer class="w-full py-8 flex flex-col items-center gap-6">
<button class="flex items-center gap-2 text-primary font-semibold text-sm py-2 px-4 rounded-full border border-primary/10 hover:bg-primary/5 transition-all" style="">
<span class="material-symbols-outlined text-[18px]" data-icon="contact_support" style="">contact_support</span>
<span class="" style="">Butuh Bantuan?</span>
</button>
<div class="flex items-center gap-6 opacity-40 grayscale">
<div class="h-6 w-px bg-outline"></div>
<p class="text-[10px] font-bold tracking-widest uppercase text-on-surface" style="">Member of National Sharia Committee</p>
<div class="h-6 w-px bg-outline"></div>
</div>
<div class="mt-4 px-8 text-center">
<p class="text-[10px] text-outline font-medium max-w-[200px]" style="">
                Aplikasi ini dilindungi oleh enkripsi 256-bit berstandar perbankan syariah.
            </p>
</div>
</footer>
<div class="fixed top-0 left-0 w-full h-1 bg-surface-container overflow-hidden">
<div class="h-full sanctuary-gradient w-1/3"></div>
</div>
</body></html>
